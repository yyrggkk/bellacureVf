databases:
  - name: bellacure-db
    databaseName: bellacure
    user: bellacure_user

services:
  - type: web
    name: bellacure-backend
    runtime: docker
    plan: free
    dockerContext: backend/calendar-back-mobile-app
    dockerfilePath: backend/calendar-back-mobile-app/Dockerfile
    envVars:
      - key: APP_NAME
        value: Bellacure API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: bellacure-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bellacure-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: bellacure-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: bellacure-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bellacure-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: SCHEDULER_KEY
        generateValue: true
